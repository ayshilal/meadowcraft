<div class="scanner-container">
  <div class="scanner-header">
    <h2>Scan Barcode</h2>
    <ion-button fill="clear" (click)="cancel()" class="close-btn">
      <ion-icon name="close-outline"></ion-icon>
    </ion-button>
  </div>

  <!-- Camera View (html5-qrcode renders here) -->
  <div class="camera-section">
    <div id="barcode-reader" class="reader-box"></div>

    <ion-button *ngIf="isScanning" expand="block" fill="outline" (click)="stopScanning()" class="stop-btn">
      <ion-icon name="stop-outline" slot="start"></ion-icon>
      Stop Camera
    </ion-button>

    <ion-button *ngIf="!isScanning && !errorMessage" expand="block" (click)="startScanning()" class="scan-btn">
      <ion-icon name="camera-outline" slot="start"></ion-icon>
      Open Camera
    </ion-button>
  </div>

  <!-- Error -->
  <div class="error-message" *ngIf="errorMessage">
    <p>{{ errorMessage }}</p>
  </div>

  <!-- Manual Entry Divider -->
  <div class="divider">
    <span>or enter manually</span>
  </div>

  <!-- Manual Barcode Entry -->
  <div class="manual-section">
    <div class="manual-input-row">
      <ion-input
        label="Barcode Number"
        labelPlacement="floating"
        fill="outline"
        [(ngModel)]="manualBarcode"
        placeholder="e.g. 3337875545860"
        class="barcode-input"
        type="text"
        inputmode="numeric"
        (keyup.enter)="submitManual()"
      ></ion-input>
      <ion-button (click)="submitManual()" [disabled]="!manualBarcode.trim()" class="lookup-btn">
        <ion-icon name="search-outline"></ion-icon>
      </ion-button>
    </div>
  </div>
</div>
