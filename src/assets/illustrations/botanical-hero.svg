<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none" stroke="#8b7d65" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Central flower -->
  <g transform="translate(200,150)">
    <!-- Petals -->
    <ellipse cx="0" cy="-30" rx="12" ry="28" transform="rotate(0)" opacity="0.7"/>
    <ellipse cx="0" cy="-30" rx="12" ry="28" transform="rotate(45)" opacity="0.7"/>
    <ellipse cx="0" cy="-30" rx="12" ry="28" transform="rotate(90)" opacity="0.7"/>
    <ellipse cx="0" cy="-30" rx="12" ry="28" transform="rotate(135)" opacity="0.7"/>
    <ellipse cx="0" cy="-30" rx="12" ry="28" transform="rotate(180)" opacity="0.7"/>
    <ellipse cx="0" cy="-30" rx="12" ry="28" transform="rotate(225)" opacity="0.7"/>
    <ellipse cx="0" cy="-30" rx="12" ry="28" transform="rotate(270)" opacity="0.7"/>
    <ellipse cx="0" cy="-30" rx="12" ry="28" transform="rotate(315)" opacity="0.7"/>
    <!-- Center -->
    <circle cx="0" cy="0" r="10" fill="#c4b99a" stroke="#8b7d65" opacity="0.5"/>
    <circle cx="0" cy="0" r="5" fill="#8b7d65" opacity="0.3"/>
  </g>
  <!-- Left branch -->
  <g transform="translate(80,200)">
    <path d="M0,0 Q20,-40 10,-80" />
    <path d="M10,-30 Q-15,-35 -20,-55" />
    <path d="M10,-30 Q25,-20 35,-40" />
    <path d="M8,-55 Q-10,-50 -18,-65" />
    <path d="M8,-55 Q20,-45 28,-60" />
    <!-- Leaves -->
    <path d="M-20,-55 Q-30,-65 -20,-75 Q-10,-65 -20,-55" fill="#8b7d65" opacity="0.1"/>
    <path d="M35,-40 Q45,-50 35,-60 Q25,-50 35,-40" fill="#8b7d65" opacity="0.1"/>
    <path d="M-18,-65 Q-28,-75 -18,-85 Q-8,-75 -18,-65" fill="#8b7d65" opacity="0.1"/>
  </g>
  <!-- Right branch -->
  <g transform="translate(320,200)">
    <path d="M0,0 Q-20,-40 -10,-80" />
    <path d="M-10,-30 Q15,-35 20,-55" />
    <path d="M-10,-30 Q-25,-20 -35,-40" />
    <path d="M-8,-55 Q10,-50 18,-65" />
    <path d="M-8,-55 Q-20,-45 -28,-60" />
    <!-- Leaves -->
    <path d="M20,-55 Q30,-65 20,-75 Q10,-65 20,-55" fill="#8b7d65" opacity="0.1"/>
    <path d="M-35,-40 Q-45,-50 -35,-60 Q-25,-50 -35,-40" fill="#8b7d65" opacity="0.1"/>
    <path d="M18,-65 Q28,-75 18,-85 Q8,-75 18,-65" fill="#8b7d65" opacity="0.1"/>
  </g>
  <!-- Bottom garland -->
  <path d="M100,240 Q150,220 200,235 Q250,250 300,230" opacity="0.4"/>
  <path d="M130,235 Q135,225 125,218" opacity="0.3"/>
  <path d="M170,238 Q175,228 165,221" opacity="0.3"/>
  <path d="M230,242 Q235,232 225,225" opacity="0.3"/>
  <path d="M270,235 Q275,225 265,218" opacity="0.3"/>
</svg>