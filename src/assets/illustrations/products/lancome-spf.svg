<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 100" fill="none" stroke="#c4956a" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
  <!-- Lancôme-style slender SPF tube - elegant gold/rose tones -->
  <!-- Tube body - slender -->
  <path d="M28,28 L26,80 Q26,88 33,88 L47,88 Q54,88 54,80 L52,28" fill="#fdf6ed" opacity="0.6"/>
  <path d="M28,28 L26,80 Q26,88 33,88 L47,88 Q54,88 54,80 L52,28"/>
  <!-- Cap -->
  <rect x="30" y="12" width="20" height="18" rx="4" fill="#c4956a" opacity="0.15"/>
  <rect x="30" y="12" width="20" height="18" rx="4"/>
  <!-- Cap ring -->
  <line x1="30" y1="28" x2="50" y2="28" stroke-width="1.5" stroke-opacity="0.6"/>
  <!-- Gold accent stripe -->
  <rect x="27" y="38" width="26" height="3" fill="#c4956a" opacity="0.2"/>
  <line x1="27" y1="38" x2="53" y2="38" stroke-opacity="0.4"/>
  <line x1="27" y1="41" x2="53" y2="41" stroke-opacity="0.4"/>
  <!-- Label text -->
  <line x1="32" y1="50" x2="48" y2="50" stroke-opacity="0.5" stroke-width="1"/>
  <line x1="34" y1="54" x2="46" y2="54" stroke-opacity="0.3" stroke-width="0.7"/>
  <!-- SPF badge -->
  <circle cx="40" cy="66" r="8" fill="#c4956a" opacity="0.08"/>
  <circle cx="40" cy="66" r="8" stroke-opacity="0.4"/>
  <line x1="35" y1="65" x2="45" y2="65" stroke-opacity="0.5" stroke-width="1"/>
  <line x1="37" y1="69" x2="43" y2="69" stroke-opacity="0.3" stroke-width="0.6"/>
  <!-- Sun rays -->
  <path d="M12,20 L16,22 M14,14 L17,17 M20,10 L21,14" stroke-opacity="0.15" stroke-width="0.8"/>
  <path d="M60,18 L64,16 M62,24 L66,22" stroke-opacity="0.15" stroke-width="0.8"/>
</svg>