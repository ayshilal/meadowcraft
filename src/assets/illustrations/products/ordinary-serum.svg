<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 100" fill="none" stroke="#2c2c2c" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
  <!-- The Ordinary-style dropper bottle - minimalist black/white -->
  <!-- Bottle body -->
  <path d="M28,40 L28,82 Q28,88 34,88 L46,88 Q52,88 52,82 L52,40" fill="#f7f5f0" opacity="0.6"/>
  <path d="M28,40 L28,82 Q28,88 34,88 L46,88 Q52,88 52,82 L52,40"/>
  <!-- Bottle neck -->
  <rect x="34" y="32" width="12" height="10" rx="1" fill="#f7f5f0" opacity="0.5"/>
  <rect x="34" y="32" width="12" height="10" rx="1"/>
  <!-- Dropper cap -->
  <rect x="33" y="14" width="14" height="20" rx="3" fill="#2c2c2c" opacity="0.15"/>
  <rect x="33" y="14" width="14" height="20" rx="3"/>
  <!-- Dropper bulb -->
  <ellipse cx="40" cy="14" rx="6" ry="5" fill="#2c2c2c" opacity="0.1"/>
  <ellipse cx="40" cy="14" rx="6" ry="5"/>
  <!-- Label - minimalist style -->
  <rect x="30" y="48" width="20" height="28" rx="1" fill="#fff" opacity="0.4"/>
  <!-- Brand text lines - The Ordinary minimal -->
  <line x1="33" y1="55" x2="47" y2="55" stroke-width="1.2" stroke-opacity="0.7"/>
  <line x1="34" y1="59" x2="46" y2="59" stroke-width="0.6" stroke-opacity="0.3"/>
  <line x1="35" y1="63" x2="45" y2="63" stroke-width="0.6" stroke-opacity="0.3"/>
  <line x1="34" y1="67" x2="46" y2="67" stroke-width="0.6" stroke-opacity="0.3"/>
  <!-- Droplet -->
  <path d="M40,90 Q38,94 40,96 Q42,94 40,90" fill="#2c2c2c" opacity="0.15" stroke-opacity="0.4"/>
</svg>