<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 100" fill="none" stroke="#3a5a7c" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
  <!-- CeraVe-style pump bottle - teal/blue tones -->
  <!-- Bottle body -->
  <rect x="22" y="34" width="36" height="52" rx="4" fill="#e8f4f8" opacity="0.6"/>
  <rect x="22" y="34" width="36" height="52" rx="4"/>
  <!-- Pump neck -->
  <rect x="33" y="24" width="14" height="12" rx="2" fill="#d1e8ef" opacity="0.5"/>
  <rect x="33" y="24" width="14" height="12" rx="2"/>
  <!-- Pump head -->
  <rect x="30" y="16" width="20" height="10" rx="3" fill="#3a5a7c" opacity="0.2"/>
  <rect x="30" y="16" width="20" height="10" rx="3"/>
  <!-- Pump nozzle -->
  <path d="M36,16 L36,12 L52,12" stroke-width="1.5"/>
  <ellipse cx="52" cy="12" rx="3" ry="2.5"/>
  <!-- Label band -->
  <rect x="24" y="46" width="32" height="30" rx="2" fill="#f4ead5" opacity="0.4"/>
  <rect x="24" y="46" width="32" height="30" rx="2" stroke-opacity="0.5"/>
  <!-- Brand text lines -->
  <line x1="30" y1="54" x2="50" y2="54" stroke-opacity="0.6" stroke-width="1.5"/>
  <line x1="32" y1="58" x2="48" y2="58" stroke-opacity="0.3" stroke-width="0.8"/>
  <line x1="34" y1="62" x2="46" y2="62" stroke-opacity="0.3" stroke-width="0.8"/>
  <!-- Foam bubbles -->
  <circle cx="17" cy="42" r="2.5" fill="#3a5a7c" opacity="0.1" stroke-opacity="0.3"/>
  <circle cx="63" cy="38" r="2" fill="#3a5a7c" opacity="0.1" stroke-opacity="0.3"/>
  <circle cx="14" cy="48" r="1.5" fill="#3a5a7c" opacity="0.08" stroke-opacity="0.2"/>
</svg>