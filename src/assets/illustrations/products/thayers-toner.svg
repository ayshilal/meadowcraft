<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 100" fill="none" stroke="#8b5e5e" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
  <!-- Thayers-style classic apothecary bottle - rose/burgundy tones -->
  <!-- Bottle body -->
  <path d="M24,38 L22,80 Q22,90 32,90 L48,90 Q58,90 58,80 L56,38" fill="#f9f0ee" opacity="0.5"/>
  <path d="M24,38 L22,80 Q22,90 32,90 L48,90 Q58,90 58,80 L56,38"/>
  <!-- Bottle neck -->
  <path d="M32,38 L32,26 Q32,22 36,22 L44,22 Q48,22 48,26 L48,38"/>
  <!-- Disc cap -->
  <rect x="30" y="14" width="20" height="10" rx="3" fill="#8b5e5e" opacity="0.12"/>
  <rect x="30" y="14" width="20" height="10" rx="3"/>
  <!-- Vintage label -->
  <rect x="26" y="46" width="28" height="34" rx="3" fill="#fdf5f0" opacity="0.5"/>
  <rect x="26" y="46" width="28" height="34" rx="3" stroke-opacity="0.6"/>
  <!-- Inner label border -->
  <rect x="28" y="48" width="24" height="30" rx="2" stroke-opacity="0.3" stroke-dasharray="1 1"/>
  <!-- Label text lines -->
  <line x1="32" y1="55" x2="48" y2="55" stroke-opacity="0.6" stroke-width="1.2"/>
  <line x1="34" y1="59" x2="46" y2="59" stroke-opacity="0.3" stroke-width="0.7"/>
  <line x1="33" y1="63" x2="47" y2="63" stroke-opacity="0.3" stroke-width="0.7"/>
  <!-- Rose decoration -->
  <circle cx="40" cy="70" r="3.5" fill="#8b5e5e" opacity="0.1" stroke-opacity="0.4"/>
  <path d="M40,66 Q38,68 40,70 Q42,68 40,66" fill="#8b5e5e" opacity="0.15"/>
  <path d="M40,70 L40,75" stroke-opacity="0.3"/>
  <path d="M38,73 L40,71 L42,73" stroke-opacity="0.2" stroke-width="0.8"/>
  <!-- Rose petals floating -->
  <ellipse cx="16" cy="55" rx="2" ry="3" fill="#8b5e5e" opacity="0.08" transform="rotate(-20 16 55)"/>
  <ellipse cx="64" cy="48" rx="1.5" ry="2.5" fill="#8b5e5e" opacity="0.08" transform="rotate(15 64 48)"/>
</svg>